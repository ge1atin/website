<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>~/about</title>
  <style>
    body {
      margin: 0;
      padding: 0;
      background: rgb(150, 211, 249);
      font-family: monospace;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      /* opacity: 0;
      transition: opacity .5s; */
    }

    .container {
      display: flex;
      border: 1px solid #40528a;
      background-color: white;
      padding: 2rem;
      max-width: 800px;
      gap: 1.5rem;
      box-sizing: border-box;
    }

    .container img {
      height: auto;
      width: auto;
      max-width: 200px;
      max-height: 200px;
      object-fit: contain;
      flex-shrink: 0;
    }

    .text {
      color: gray;
    }

    .text span {
      font-size: 1.2em;
    }

    .text i {
      font-size: 1em;
    }

    a {
      text-decoration: none;
      color: rgb(0, 170, 255);
    }

    a:visited {
      color: rgb(0, 170, 255);
    }

    a:hover {
      text-decoration: underline;
      color: rgb(27, 213, 255);
    }

    a:active {
      text-decoration: underline;
      color: rgb(8, 138, 218);
    }

    .cursor {
      display: inline-block;
      width: 0.6em;
      height: 1.2em;
      background: #ddd;
      margin-left: 2px;
      animation: blink 1s steps(2, start) infinite;
      vertical-align: text-bottom;
    }

    @keyframes blink {
      to {
        visibility: hidden;
      }
    }
  </style>
</head>
